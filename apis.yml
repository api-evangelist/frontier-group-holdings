description: >-
  Frontier Group Holdings is the parent company of Frontier Airlines, an
  ultra low-cost carrier headquartered in Denver, Colorado. The airline
  operates an Airbus A320-family fleet serving destinations across the
  United States, Mexico, Canada, the Caribbean, and Latin America. No
  public self-service developer API or developer portal has been
  identified; airline distribution and partner integrations are typically
  handled through GDSs, NDC channels, and direct travel-agent agreements.
